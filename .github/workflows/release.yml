name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact: lightyChat
          - os: macos-latest
            artifact: lightyChat
          - os: windows-latest
            artifact: lightyChat.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: pip install .

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: pyinstaller --name lightyChat --onefile --console --paths src src/lightychat/__main__.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
